name: Deploy to GCE

on:
  push:
    branches: [main]
    paths: ['writebot/**']
  workflow_dispatch:

defaults:
  run:
    working-directory: writebot

env:
  VM_NAME: ${{ secrets.GCE_VM_NAME }}
  VM_ZONE: ${{ secrets.GCE_VM_ZONE }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  DEPLOY_DIR: /home/${{ secrets.GCE_USER }}/writebot

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy files to VM
        run: |
          gcloud compute scp --recurse \
            bot/ requirements.txt start.sh restart.sh Dockerfile \
            ${{ secrets.GCE_USER }}@${VM_NAME}:${DEPLOY_DIR}/ \
            --zone=${VM_ZONE}

      - name: Restart bot on VM
        run: |
          gcloud compute ssh ${{ secrets.GCE_USER }}@${VM_NAME} \
            --zone=${VM_ZONE} \
            --command="cd ${DEPLOY_DIR} && bash restart.sh"

      - name: Verify bot is running
        run: |
          sleep 3
          gcloud compute ssh ${{ secrets.GCE_USER }}@${VM_NAME} \
            --zone=${VM_ZONE} \
            --command="pgrep -f 'python.*-m bot' && echo 'Bot is running' || echo 'Bot failed to start'"
